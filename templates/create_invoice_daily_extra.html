<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สร้างบิลเพิ่มเติม - ห้อง {{ room_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #c3c9eb; font-family: "Sarabun", sans-serif; }
        .container { max-width: 750px; }
        .page-box { background: white; border-radius: 18px; padding: 30px; box-shadow: 0 8px 20px rgba(0,0,0,.1); margin-top: 20px; }
        .room-info-badge { background: #eef2ff; color: #4f46e5; padding: 15px; border-radius: 12px; margin-bottom: 25px; border-left: 5px solid #4f46e5; }
        .btn-back-modern { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; font-weight: 600; color: #fff; background: linear-gradient(135deg, #6366f1, #4f46e5); border-radius: 8px; text-decoration: none; }
        .item-row { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; }
        .btn-remove-item { position: absolute; top: -10px; right: -10px; background: #dc3545; color: white; border-radius: 50%; width: 26px; height: 26px; border: none; cursor: pointer; }
        .total-box { background: #f0fff4; border-radius: 12px; padding: 20px; text-align: right; border: 2px dashed #28a745; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-white mb-0">ออกบิลเพิ่มเติม (Extra Bill)</h3>
            <a href="javascript:history.back()" class="btn-back-modern">ย้อนกลับ</a>
        </div>

        <div class="page-box">
            <div class="room-info-badge">
                <div class="row">
                    <div class="col-6">
                        <strong>ห้อง:</strong> {{ room_name }} <br>
                        <strong>อ้างอิงบิลหลัก:</strong> #{{ invoice_id }}
                    </div>
                    <div class="col-6 text-end">
                        <strong>แขกผู้พัก:</strong> <br>
                        <span>{{ guest_name }}</span>
                    </div>
                </div>
            </div>

            <form action="/create_invoice_daily_extra/{{ invoice_id }}" method="POST">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <label class="fw-bold">รายการที่ต้องการเรียกเก็บ</label>
                    <button type="button" class="btn btn-primary btn-sm" onclick="addItem()">+ เพิ่มรายการ</button>
                </div>

                <div id="items-container">
                    <div class="item-row" id="item-0">
                        <div class="row g-2">
                            <div class="col-md-5">
                                <label class="small text-muted">ชื่อรายการ</label>
                                <input type="text" class="form-control" name="items[0][description]" placeholder="เช่น ค่าอาหาร, ค่าซักรีด" required>
                            </div>
                            <div class="col-md-4">
                                <label class="small text-muted">ประเภท</label>
                                <select class="form-select" name="items[0][type]">
                                    <option value="service">ค่าบริการ/อาหาร</option>
                                    <option value="penalty">ค่าปรับ/เสียหาย</option>
                                    <option value="other">อื่นๆ</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted">จำนวนเงิน</label>
                                <input type="number" step="0.01" class="form-control item-amount" name="items[0][amount]" placeholder="0.00" oninput="calculateTotal()" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold mb-2">กำหนดชำระเงิน</label>
                        <input type="date" class="form-control" name="due_date" value="{{ today_date }}" required>
                    </div>
                </div>

                <div class="total-box mb-4">
                    <div class="text-muted small">รวมยอดเงินสุทธิ</div>
                    <div class="fs-2 fw-bold text-success">
                        <span id="display-total">0.00</span> <small class="fs-6 text-dark">บาท</small>
                    </div>
                    <input type="hidden" name="total_amount" id="input-total" value="0">
                </div>

                <div class="mb-4">
                    <label class="fw-bold mb-2">หมายเหตุเพิ่มเติม</label>
                    <textarea class="form-control" name="remark" rows="2" placeholder="ใส่ข้อมูลเพิ่มเติมที่นี่..."></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100 fw-bold py-3" style="border-radius: 12px;">
                    💾 บันทึกและออกบิลเพิ่มเติม
                </button>
            </form>
        </div>
    </div>

    <script>
        let itemIndex = 1;
        function addItem() {
            const container = document.getElementById('items-container');
            const html = `
                <div class="item-row" id="item-${itemIndex}">
                    <button type="button" class="btn-remove-item" onclick="removeItem(${itemIndex})">×</button>
                    <div class="row g-2">
                        <div class="col-md-5">
                            <input type="text" class="form-control" name="items[${itemIndex}][description]" placeholder="รายการใหม่" required>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select" name="items[${itemIndex}][type]">
                                <option value="service">ค่าบริการ/อาหาร</option>
                                <option value="penalty">ค่าปรับ/เสียหาย</option>
                                <option value="other">อื่นๆ</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="number" step="0.01" class="form-control item-amount" name="items[${itemIndex}][amount]" placeholder="0.00" oninput="calculateTotal()" required>
                        </div>
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            itemIndex++;
        }

        function removeItem(idx) {
            document.getElementById(`item-${idx}`).remove();
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            const amounts = document.getElementsByClassName('item-amount');
            for (let input of amounts) {
                total += parseFloat(input.value) || 0;
            }
            document.getElementById('display-total').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('input-total').value = total.toFixed(2);
        }
    </script>
</body>
</html>
