<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างบิลด้วยมือ - {{ contract.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    <style>
        body {
            background: #c3c9eb;
            font-family: 'Sarabun', sans-serif;
            color: #333;
        }

        .card-custom {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header-section {
            background: #ffc107;
            padding: 25px;
            font-weight: bold;
            border-bottom: 5px solid #e0ac00;
        }

        .section-title {
            border-left: 5px solid #ffc107;
            padding-left: 10px;
            margin: 25px 0 15px;
            font-weight: bold;
        }

        .bg-light-yellow {
            background-color: #fffdf5;
            border: 1px solid #fef3c7;
        }

        .rate-badge {
            font-size: 0.8rem;
            background: #333;
            color: #fff;
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* สไตล์เพิ่มเติมสำหรับ Item Row */
        .item-row {
            transition: all 0.2s;
        }

        .item-row:hover {
            background: #f8f9fa;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="card card-custom bg-white">
                    <div class="header-section d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">⚙️ สร้างบิลด้วยมือ (Manual Handle)</h4>
                        <button type="button" class="btn btn-dark btn-sm rounded-pill px-3 shadow-sm"
                            onclick="pullLastMeter()">
                            🔄 ดึงมิเตอร์ครั้งก่อน
                        </button>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form action="{{ url_for('manual_create_bill', contract_id=contract.contract_id) }}"
                            method="POST" id="billForm">

                            <div class="row g-3 mb-4">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">ประเภทบิล</label>
                                    <select name="invoice_type" id="invoice_type"
                                        class="form-select border-warning shadow-sm">
                                        <option value="monthly" selected>บิลรายเดือนปกติ</option>
                                        <option value="final">บิลสุดท้าย </option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">วันเริ่ม Billing</label>
                                    <input type="text" name="billing_start" id="billing_start"
                                        class="form-control date-picker" placeholder="วว/ดด/ปป" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">วันสิ้นสุด Billing</label>
                                    <input type="text" name="billing_end" id="billing_end"
                                        class="form-control date-picker" placeholder="วว/ดด/ปป" required>
                                </div>
                            </div>

                            <div class="section-title d-flex justify-content-between mb-3">
                                <span>⚡ ข้อมูลไฟฟ้า</span>
                                <span class="rate-badge mb-2">ค่าไฟหน่วยละ {{ e_rate }} ฿</span>
                            </div>
                            <div class="row g-3 p-3 rounded-4 bg-light-yellow mb-4 shadow-sm">
                                <div class="col-md-3">
                                    <label class="small text-muted">เลขไฟเก่า (Prev)</label>
                                    <input type="number" name="prev_elec" id="prev_elec" class="form-control"
                                        step="0.01" oninput="calculateElec()">
                                </div>
                                <div class="col-md-3">
                                    <label class="small text-muted text-primary fw-bold">เลขไฟใหม่ (Curr)</label>
                                    <input type="number" name="curr_elec" id="curr_elec"
                                        class="form-control border-primary shadow-sm" step="0.01"
                                        oninput="calculateElec()">
                                </div>
                                <div class="col-md-2 text-center border-end border-start">
                                    <label class="small text-muted">จำนวนหน่วย</label>
                                    <div id="elec_units" class="fs-5 fw-bold mt-1 text-secondary">-</div>
                                </div>
                                <div class="col-md-4">
                                    <label class="small fw-bold text-dark">รวมเงินค่าไฟ (฿)</label>
                                    <input type="number" name="e_total" id="e_total"
                                        class="form-control form-control-lg fw-bold text-primary border-primary"
                                        step="0.01" oninput="updateGrandTotal()">
                                </div>
                            </div>

                            <div class="section-title d-flex justify-content-between mb-3">
                                <span>💧 ข้อมูลประปา</span>
                                <span class="rate-badge mb-2">ค่าน้ำหน่วยละ {{ w_rate }} ฿</span>
                            </div>
                            <div class="row g-3 p-3 rounded-4 bg-light-yellow mb-4 shadow-sm">
                                <div class="col-md-3">
                                    <label class="small text-muted">เลขน้ำเก่า (Prev)</label>
                                    <input type="number" name="prev_water" id="prev_water" class="form-control"
                                        step="0.01" oninput="calculateWater()">
                                </div>
                                <div class="col-md-3">
                                    <label class="small text-muted text-info fw-bold">เลขน้ำใหม่ (Curr)</label>
                                    <input type="number" name="curr_water" id="curr_water"
                                        class="form-control border-info shadow-sm" step="0.01"
                                        oninput="calculateWater()">
                                </div>
                                <div class="col-md-2 text-center border-end border-start">
                                    <label class="small text-muted">จำนวนหน่วย</label>
                                    <div id="water_units" class="fs-5 fw-bold mt-1 text-secondary">-</div>
                                </div>
                                <div class="col-md-4">
                                    <label class="small fw-bold text-dark">รวมเงินค่าน้ำ (฿)</label>
                                    <input type="number" name="w_total" id="w_total"
                                        class="form-control form-control-lg fw-bold text-info border-info" step="0.01"
                                        oninput="updateGrandTotal()">
                                </div>
                            </div>

                            <div class="section-title">📋 รายการเรียกเก็บตามสัญญา</div>
                            <div id="contract_items_container" class="mb-4">
                                {% if default_options %}
                                {% for opt in default_options %}
                                <div class="card shadow-sm border-0 mb-2 rounded-3">
                                    <div class="card-body p-3">
                                        <div class="row g-3 align-items-end">
                                            <div class="col-md-5">
                                                <label class="small text-muted mb-1">ชื่อรายการ</label>
                                                <input type="text" name="item_name[]"
                                                    class="form-control bg-light border-0" value="{{ opt.name }}"
                                                    readonly>
                                            </div>
                                            <div class="col-md-3">
                                                <label class="small text-muted mb-1">ประเภท</label>
                                                <select class="form-select border-0 bg-light"
                                                    style="pointer-events: none;">
                                                    <option value="option" selected>ส่วนเสริมตามสัญญา</option>
                                                </select>
                                            </div>
                                            <div class="col-md-3">
                                                <label class="small text-muted mb-1">จำนวนเงิน</label>
                                                <input type="number" name="item_amount[]"
                                                    class="form-control item-price border-bottom"
                                                    value="{{ opt.price }}" step="0.01" oninput="updateGrandTotal()">
                                            </div>
                                            <div class="col-md-1 text-end">
                                                <button type="button" class="btn btn-link text-danger p-0"
                                                    onclick="this.closest('.card').remove(); updateGrandTotal();">✕</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                {% endfor %}
                                {% endif %}
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="fw-bold">รายการเรียกเก็บเงินเพิ่ม</div>
                                <button type="button" class="btn btn-primary btn-sm rounded-pill px-3"
                                    onclick="addItemRow()">+ เพิ่มรายการ</button>
                            </div>

                            <div id="manual_items_container">
                            </div>

                            <div class="mt-4">
                                <label class="fw-bold mb-2">กำหนดชำระเงิน</label>
                                <input type="text" name="due_date" class="form-control date-picker shadow-sm"
                                    placeholder="วว/ดด/ปปปป">
                            </div>

                            <div class="section-title">💰 ยอดเงินหลักและค่าคืนประกัน</div>
                            <div class="row g-3 mb-4">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">ค่าเช่าห้อง</label>
                                    <input type="number" name="rent_amount" class="form-control shadow-sm"
                                        value="{{ contract.price }}" step="0.01" oninput="updateGrandTotal()">
                                </div>
                                <div class="col-md-4" id="deposit_area" style="display: none;">
                                    <label class="form-label fw-bold text-danger">💸 คืนเงินประกัน</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-danger text-white border-0">-</span>
                                        <input type="number" name="deposit_refund"
                                            class="form-control border-danger shadow-sm" step="0.01"
                                            placeholder="กรอกบวก" oninput="updateGrandTotal()">
                                    </div>
                                </div>
                            </div>

                            <hr class="my-5">

                            <div class="d-grid gap-3">
                                <button type="submit" id="submitBtn"
                                    class="btn btn-warning btn-lg fw-bold py-3 shadow border-bottom border-warning">
                                    ✅ ยืนยันบันทึกข้อมูลและออกบิล
                                </button>
                                <a href="javascript:history.back()"
                                    class="btn btn-light text-secondary text-center">ยกเลิก</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const E_RATE = parseFloat("{{ e_rate }}");
        const W_RATE = parseFloat("{{ w_rate }}");
        const lastElec = "{{ last_bill.current_electricity_reading if last_bill else '' }}";
        const lastWater = "{{ last_bill.current_water_reading if last_bill else '' }}";

        document.addEventListener('DOMContentLoaded', function () {
            flatpickr(".date-picker", {
                dateFormat: "Y-m-d", // ฟอร์แมตที่จะส่งเข้า DB (YYYY-MM-DD)
                altInput: true,      // ตัวที่โชว์ให้คนเห็น
                altFormat: "d/m/Y",  // ฟอร์แมตที่คนเห็น
                locale: "th",
                allowInput: true
            });
            updateGrandTotal();
        });

        function addItemRow() {
            const container = document.getElementById('manual_items_container');
            const div = document.createElement('div');
            div.className = 'card shadow-sm border-0 mb-2 rounded-3';
            div.innerHTML = `
        <div class="card-body p-3">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="small text-muted mb-1">ชื่อรายการ</label>
                    <input type="text" name="item_name[]" class="form-control border-0" placeholder="เช่น ค่าล้างแอร์">
                </div>
                <div class="col-md-3">
                    <label class="small text-muted mb-1">ประเภท</label>
                    <select class="form-select border-0 bg-light" style="pointer-events: none;">
                        <option value="service" selected>ค่าบริการ/ซ่อมแซม</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="small text-muted mb-1">จำนวนเงิน</label>
                    <input type="number" name="item_amount[]" class="form-control item-price border-bottom" value="0.00" step="0.01" oninput="updateGrandTotal()">
                </div>
                <div class="col-md-1 text-end">
                    <button type="button" class="btn btn-link text-danger p-0" onclick="this.closest('.card').remove(); updateGrandTotal();">✕</button>
                </div>
            </div>
        </div>
        `;
            container.appendChild(div);
        }

        function updateGrandTotal() {
            const rent = parseFloat(document.getElementsByName('rent_amount')[0].value) || 0;
            const eTotal = parseFloat(document.getElementById('e_total').value) || 0;
            const wTotal = parseFloat(document.getElementById('w_total').value) || 0;

            let itemsSum = 0;
            document.querySelectorAll('.item-price').forEach(input => {
                itemsSum += parseFloat(input.value) || 0;
            });

            let deposit = 0;
            if (document.getElementById('invoice_type').value === 'final') {
                deposit = parseFloat(document.getElementsByName('deposit_refund')[0].value) || 0;
            }

            const total = rent + eTotal + wTotal + itemsSum - deposit;
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = `✅ ยืนยันบันทึก (ยอดสุทธิ: ${total.toLocaleString(undefined, { minimumFractionDigits: 2 })} ฿)`;
        }

        function pullLastMeter() {
            if (!lastElec && !lastWater) {
                Swal.fire({ icon: 'error', title: 'ไม่พบข้อมูล', text: 'สัญญานี้ยังไม่เคยมีบิลที่ชำระแล้ว' });
            } else {
                document.getElementById('prev_elec').value = lastElec;
                document.getElementById('prev_water').value = lastWater;
                calculateElec(); calculateWater();
                Swal.fire({ icon: 'success', title: 'ดึงข้อมูลสำเร็จ', timer: 800, showConfirmButton: false });
            }
        }

        function calculateElec() {
            const prev = parseFloat(document.getElementById('prev_elec').value) || 0;
            const curr = parseFloat(document.getElementById('curr_elec').value) || 0;
            if (curr >= prev && curr > 0) {
                const units = curr - prev;
                document.getElementById('elec_units').innerText = units.toFixed(2);
                document.getElementById('e_total').value = (units * E_RATE).toFixed(2);
            }
            updateGrandTotal();
        }

        function calculateWater() {
            const prev = parseFloat(document.getElementById('prev_water').value) || 0;
            const curr = parseFloat(document.getElementById('curr_water').value) || 0;
            if (curr >= prev && curr > 0) {
                const units = curr - prev;
                document.getElementById('water_units').innerText = units.toFixed(2);
                document.getElementById('w_total').value = (units * W_RATE).toFixed(2);
            }
            updateGrandTotal();
        }

        document.getElementById('invoice_type').addEventListener('change', function () {
            document.getElementById('deposit_area').style.display = (this.value === 'final') ? 'block' : 'none';
            updateGrandTotal();
        });
    </script>
</body>

</html>
