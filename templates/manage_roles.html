{% extends "layout.html" %}
{% block content %}
<title>Settings - จัดการบทบาทผู้ใช้</title>
<div class="container mt-4">
    <h2 class="mb-4">👥 จัดการบทบาท (Roles)</h2>

    <!-- ฟอร์มเพิ่มบทบาทใหม่ -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">เพิ่มบทบาทใหม่</div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('add_role') }}" class="row g-2">
                <div class="col-md-8">
                    <input type="text" class="form-control" name="r_name" placeholder="ชื่อบทบาท" required>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-success w-100">+ เพิ่มบทบาท</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ตารางรายการบทบาท -->
    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ชื่อบทบาท</th>
                    <th>การจัดการ</th>
                </tr>
            </thead>
            <tbody>
                {% for role in roles %}
                <tr>
                    <td>{{ role.r_name }}</td>
                    <td>
                        <a href="{{ url_for('edit_role', role_id=role['role_id']) }}"
                            class="btn btn-sm btn-warning">แก้ไข</a>
                        {% if role.name != 'admin' %}
                        <a href="{{ url_for('delete_role', role_id=role['role_id']) }}" class="btn btn-sm btn-danger"
                            onclick="return confirm('ยืนยันการลบบทบาทนี้?')">ลบ</a>
                        {% else %}
                        <span class="text-muted">ไม่สามารถลบได้</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
