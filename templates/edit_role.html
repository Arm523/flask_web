{% extends "layout.html" %}

{% block title %}Edit Role{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3>แก้ไขบทบาท</h3>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">ชื่อบทบาทใหม่</label>
            <input type="text" name="r_name" class="form-control" value="{{ role.r_name }}" required>
        </div>
        <button type="submit" class="btn btn-primary">บันทึก</button>
        <a href="{{ url_for('manage_roles') }}" class="btn btn-secondary">ยกเลิก</a>
    </form>
</div>
{% endblock %}
